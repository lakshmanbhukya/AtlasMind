name: AtlasMind CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    - name: Install dependencies
      run: |
        cd server
        npm ci
    - name: Run tests
      run: |
        cd server
        npm test
    
    - name: Discord Notification
      if: success()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "Server Tests Passed"
        description: "AtlasMind server tests completed successfully on ${{ github.ref_name }}."
        color: 0x00ff00

  build-client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
    - name: Install dependencies
      run: |
        cd client
        npm ci
    - name: Build
      run: |
        cd client
        npm run build
    
    - name: Discord Notification
      if: success()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "Client Build Passed"
        description: "AtlasMind client build completed successfully on ${{ github.ref_name }}."
        color: 0x00ff00

  release:
    needs: [build-and-test-server, build-client]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Server Image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/atlasmind-server:latest,${{ secrets.DOCKERHUB_USERNAME }}/atlasmind-server:${{ github.sha }}

    - name: Discord Notification (Server Image)
      if: success()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "Server Image Pushed"
        description: "AtlasMind server image successfully pushed to Docker Hub."
        color: 0x0000ff

    - name: Build and Push Client Image
      uses: docker/build-push-action@v5
      with:
        context: ./client
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/atlasmind-client:latest,${{ secrets.DOCKERHUB_USERNAME }}/atlasmind-client:${{ github.sha }}

    - name: Discord Notification (Client Image)
      if: success()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "Client Image Pushed"
        description: "AtlasMind client image successfully pushed to Docker Hub."
        color: 0x0000ff
